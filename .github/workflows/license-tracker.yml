# System 3 — License / Dependency Tracker (reusable workflow)
#
# Per-ecosystem: installs deps then runs license detection (npm, Python, Java).
# Two-job pattern:
#   scan  — credential-less; installs + detects; emits results artifact
#   notify — contents:write + SES OIDC; diffs manifest, emails, then persists the
#            refreshed manifest to a dedicated state branch (secinfra/manifests)
#            via git plumbing — no default-branch push, survives PR protection.
#
# Adopt in your repo:
#   jobs:
#     licenses:
#       uses: ignitesol/ignitesol.security-infra/.github/workflows/license-tracker.yml@v1
#       secrets: inherit

name: License Tracker

on:
  workflow_call:
    inputs:
      ecosystems:
        description: "Comma-separated list of ecosystems to scan: npm,python,java"
        type: string
        default: "npm,python,java"
    secrets:
      SECINFRA_SES_ROLE_ARN:
        required: false
      SECINFRA_SES_FROM:
        required: false
      SECINFRA_SES_REGION:
        required: false
      SECINFRA_SECURITY_CC:
        required: false

jobs:
  # ── Job 1: install deps + detect licenses (no credentials) ──────────────────
  scan:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Create results directory
        run: mkdir -p results

      # ── npm ──────────────────────────────────────────────────────────────────
      - name: Set up Node
        if: contains(inputs.ecosystems, 'npm')
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5.0.0
        with:
          node-version: "20"

      - name: npm — install (all package.json locations)
        if: contains(inputs.ecosystems, 'npm') && hashFiles('**/package.json') != ''
        run: |
          find . -name package.json \
               -not -path '*/node_modules/*' | while read pj; do
            dir=$(dirname "$pj")
            echo "--- npm install in $dir ---"
            (cd "$dir" && (npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true))
          done
        continue-on-error: true

      - name: npm — detect licenses (all package.json locations)
        if: contains(inputs.ecosystems, 'npm') && hashFiles('**/package.json') != ''
        run: |
          npm install --save-dev --ignore-scripts license-checker-rseidelsohn 2>/dev/null || true
          mkdir -p /tmp/lic-chunks
          i=0
          while IFS= read -r pj; do
            i=$((i+1))
            dir=$(dirname "$pj")
            echo "--- license-checker in $dir ---"
            (cd "$dir" && npx --no license-checker-rseidelsohn \
              --json --out "/tmp/lic-chunks/$i.json" --excludePackages "" 2>/dev/null || true)
          done < <(find . -name package.json -not -path '*/node_modules/*')
          python3 -c "
import json, glob
merged = {}
for f in sorted(glob.glob('/tmp/lic-chunks/*.json')):
    try:
        merged.update(json.load(open(f)))
    except Exception as e:
        print('skip', f, e)
with open('results/npm-licenses-raw.json', 'w') as fh:
    json.dump(merged, fh)
print('Merged', len(merged), 'packages from', len(list(glob.glob('/tmp/lic-chunks/*.json'))), 'project(s)')
"
        continue-on-error: true

      # ── Python ───────────────────────────────────────────────────────────────
      - name: Set up Python
        if: contains(inputs.ecosystems, 'python')
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Python — install (all manifest locations)
        if: contains(inputs.ecosystems, 'python')
        run: |
          # Install from every requirements*.txt found in the repo
          find . -name "requirements*.txt" \
               -not -path '*/node_modules/*' | while read req; do
            echo "--- pip install -r $req ---"
            pip install --quiet -r "$req" 2>/dev/null || true
          done
          # Install any pyproject.toml / setup.py packages
          find . \( -name "pyproject.toml" -o -name "setup.py" \) \
               -not -path '*/node_modules/*' | while read manifest; do
            dir=$(dirname "$manifest")
            echo "--- pip install $dir ---"
            pip install --quiet "$dir" 2>/dev/null || true
          done
          # poetry projects
          find . -name "poetry.lock" \
               -not -path '*/node_modules/*' | while read lock; do
            dir=$(dirname "$lock")
            echo "--- poetry install in $dir ---"
            pip install --quiet poetry 2>/dev/null || true
            (cd "$dir" && poetry install --no-root 2>/dev/null || true)
          done
        continue-on-error: true

      - name: Python — detect licenses
        if: contains(inputs.ecosystems, 'python')
        run: |
          pip install --quiet pip-licenses
          pip-licenses --format=json --with-system --output-file results/python-licenses-raw.json \
            || true
        continue-on-error: true

      # ── Java (Maven / Gradle) ────────────────────────────────────────────────
      - name: Set up Java
        if: contains(inputs.ecosystems, 'java')
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Java Maven — detect licenses
        if: contains(inputs.ecosystems, 'java') && hashFiles('pom.xml') != ''
        run: |
          mvn --quiet org.codehaus.mojo:license-maven-plugin:2.4.0:download-licenses \
            -DlicensesOutputFile=results/java-licenses-raw.json \
            -DlicensesOutputFileFormat=json \
            || true
        continue-on-error: true

      - name: Java Gradle — detect licenses
        if: contains(inputs.ecosystems, 'java') && hashFiles('build.gradle', 'build.gradle.kts') != ''
        run: |
          if [ -f gradlew ]; then chmod +x gradlew; fi
          ${GRADLEW:-./gradlew} --quiet generateLicenseReport \
            || true
          # Copy wherever the plugin writes; normalize in the next step
        continue-on-error: true

      # ── Normalize all raw outputs to unified JSON ─────────────────────────
      - name: Normalize license outputs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const result = {};

            // npm: { "pkg@ver": { licenses, ... } }
            const npmRaw = 'results/npm-licenses-raw.json';
            if (fs.existsSync(npmRaw)) {
              const raw = JSON.parse(fs.readFileSync(npmRaw, 'utf8'));
              result['npm'] = Object.entries(raw).map(([pkgver, info]) => {
                const at = pkgver.lastIndexOf('@');
                return {
                  name: pkgver.substring(0, at),
                  version: pkgver.substring(at + 1),
                  license: Array.isArray(info.licenses) ? info.licenses.join(', ') : (info.licenses || 'Unknown'),
                  spdx_id: Array.isArray(info.licenses) ? info.licenses[0] : (info.licenses || ''),
                };
              });
            }

            // Python: [{ Name, Version, License }]
            const pyRaw = 'results/python-licenses-raw.json';
            if (fs.existsSync(pyRaw)) {
              const raw = JSON.parse(fs.readFileSync(pyRaw, 'utf8'));
              result['python'] = raw.map(pkg => ({
                name: pkg.Name,
                version: pkg.Version,
                license: pkg.License || 'Unknown',
                spdx_id: pkg.License || '',
              }));
            }

            // Java: normalize from license-maven-plugin JSON (best-effort)
            const javaRaw = 'results/java-licenses-raw.json';
            if (fs.existsSync(javaRaw)) {
              try {
                const raw = JSON.parse(fs.readFileSync(javaRaw, 'utf8'));
                const deps = raw.dependencies || [];
                result['java'] = deps.map(dep => ({
                  name: `${dep.groupId}:${dep.artifactId}`,
                  version: dep.version || '',
                  license: (dep.licenses || []).map(l => l.name).join(', ') || 'Unknown',
                  spdx_id: (dep.licenses || [])[0]?.url || '',
                }));
              } catch (e) {
                console.log('Java license parse error (non-fatal):', e.message);
              }
            }

            fs.writeFileSync('results/licenses-current.json', JSON.stringify(result, null, 2));
            console.log('Normalized ecosystems:', Object.keys(result).join(', '));

      - name: Upload results artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        with:
          name: license-results-${{ github.run_id }}
          path: results/
          retention-days: 7

  # ── Job 2: notify + commit manifest ─────────────────────────────────────────
  notify:
    name: Notify
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # OIDC → SES role
      contents: write    # commit refreshed manifest back to repo
    env:
      # Promoted to job level so the if: condition on the OIDC step can read it
      SECINFRA_SES_ROLE_ARN: ${{ secrets.SECINFRA_SES_ROLE_ARN }}
    steps:
      - name: Checkout security-infra (scripts + templates)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ignitesol/ignitesol.security-infra
          path: .secinfra

      - name: Checkout caller repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: .caller-repo

      - name: Download results artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5.0.0
        with:
          name: license-results-${{ github.run_id }}
          path: results

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install secinfra
        run: pip install --quiet .secinfra/

      - name: Configure AWS credentials (OIDC → SES role)
        if: ${{ env.SECINFRA_SES_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        with:
          role-to-assume: ${{ secrets.SECINFRA_SES_ROLE_ARN }}
          aws-region: ${{ secrets.SECINFRA_SES_REGION || 'us-east-1' }}

      - name: Send email report + persist manifest to state branch
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}/.caller-repo
          SECINFRA_SES_FROM: ${{ secrets.SECINFRA_SES_FROM }}
          SECINFRA_SES_REGION: ${{ secrets.SECINFRA_SES_REGION || 'us-east-1' }}
          SECINFRA_SECURITY_CC: ${{ secrets.SECINFRA_SECURITY_CC }}
          SECINFRA_DRY_RUN: ${{ secrets.SECINFRA_SES_ROLE_ARN == '' && '1' || '0' }}
        run: |
          python -m secinfra.license_report \
            --results-dir results \
            --workspace "${{ github.workspace }}/.caller-repo"
