# System 2 — Bumblebee Supply-Chain Exposure Scan (reusable workflow)
#
# Runs bumblebee using the threat_intel catalogs pinned in config/catalog-pin.txt.
# Two-job pattern: scan (credential-less) → notify (SES + OIDC).
#
# Adopt in your repo:
#   jobs:
#     bumblebee:
#       uses: ignitesol/ignitesol.security-infra/.github/workflows/bumblebee-scan.yml@v1
#       secrets: inherit

name: Bumblebee Scan

on:
  workflow_call:
    inputs:
      scan_profile:
        description: "Bumblebee scan profile: baseline | project | deep"
        type: string
        default: "project"
      scan_max_duration:
        description: "Hard cap on the bumblebee scan walk (e.g. 5m, 10m)"
        type: string
        default: "10m"
    secrets:
      SECINFRA_SES_ROLE_ARN:
        required: false
      SECINFRA_SES_FROM:
        required: false
      SECINFRA_SES_REGION:
        required: false
      SECINFRA_SECURITY_CC:
        required: false

jobs:
  # ── Job 1: run bumblebee, emit NDJSON artifact ──────────────────────────────
  scan:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30   # hard backstop: bounds venv installs + scan walk
    permissions:
      contents: read
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Checkout security-infra (config + catalogs)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ignitesol/ignitesol.security-infra
          path: .secinfra

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "stable"

      - name: Install bumblebee at pinned commit
        run: |
          PIN=$(cat .secinfra/config/catalog-pin.txt | tr -d '[:space:]')
          echo "Installing bumblebee @ $PIN"
          go install "github.com/perplexityai/bumblebee/cmd/bumblebee@${PIN}"

      - name: Fetch bumblebee catalogs at pinned commit
        run: |
          PIN=$(cat .secinfra/config/catalog-pin.txt | tr -d '[:space:]')
          git clone --no-checkout https://github.com/perplexityai/bumblebee .bumblebee-src
          git -C .bumblebee-src checkout "$PIN" -- threat_intel/
          echo "Catalogs:"
          ls .bumblebee-src/threat_intel/*.json

      # npm needs no install: bumblebee reads the committed package-lock.json
      # (and any node_modules metadata) directly during the --root . walk.
      #
      # PyPI is install-only: bumblebee's Python sources are install artifacts
      # (*.dist-info/METADATA), never requirements.txt. We materialize each
      # requirements file into its OWN venv so per-function pinned versions
      # don't clobber each other in a shared environment, then scan each venv
      # as an explicit --root. Venvs live in $RUNNER_TEMP (outside the
      # checkout) so the --root . npm walk doesn't re-scan them.
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Build per-function Python venvs (PyPI on-disk metadata)
        run: |
          venv_base="$RUNNER_TEMP/secinfra-venvs"
          roots_file="$RUNNER_TEMP/secinfra-venv-roots"
          mkdir -p "$venv_base"
          : > "$roots_file"
          find . -name "requirements*.txt" \
               -not -path '*/.secinfra/*' \
               -not -path '*/.bumblebee-src/*' \
               -not -path '*/node_modules/*' | while read -r req; do
            slug=$(printf '%s' "${req#./}" | tr '/.' '__')
            venv="$venv_base/$slug"
            echo "--- venv for $req -> $venv ---"
            python -m venv "$venv" 2>/dev/null || continue
            "$venv/bin/pip" install --quiet --upgrade pip 2>/dev/null || true
            "$venv/bin/pip" install --quiet -r "$req" 2>/dev/null || true
            echo "$venv" >> "$roots_file"
          done
          echo "Built venvs:"; cat "$roots_file" 2>/dev/null || echo "(none)"
        continue-on-error: true

      - name: Create results directory
        run: |
          mkdir -p results
          touch results/bumblebee.ndjson

      - name: Run bumblebee
        run: |
          CATALOGS=""
          for f in .bumblebee-src/threat_intel/*.json; do
            CATALOGS="$CATALOGS --exposure-catalog $f"
          done
          # --root . covers npm (committed lockfiles) + any on-disk metadata.
          # Each per-function venv is added as its own root for PyPI coverage.
          ROOTS="--root ."
          roots_file="$RUNNER_TEMP/secinfra-venv-roots"
          if [ -f "$roots_file" ]; then
            while read -r v; do
              [ -n "$v" ] && ROOTS="$ROOTS --root $v"
            done < "$roots_file"
          fi
          bumblebee scan \
            --profile "${{ inputs.scan_profile }}" \
            --max-duration "${{ inputs.scan_max_duration }}" \
            $ROOTS \
            --output file \
            --output-file results/bumblebee.ndjson \
            $CATALOGS
        continue-on-error: true

      - name: Upload results artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        with:
          name: bumblebee-results-${{ github.run_id }}
          path: results/
          retention-days: 7

  # ── Job 2: notify ────────────────────────────────────────────────────────────
  notify:
    name: Notify
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      # Promoted to job level so the if: condition on the OIDC step can read it
      SECINFRA_SES_ROLE_ARN: ${{ secrets.SECINFRA_SES_ROLE_ARN }}
    steps:
      - name: Checkout security-infra (scripts + templates)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          repository: ignitesol/ignitesol.security-infra
          path: .secinfra

      - name: Checkout caller repo (for .security/config.yml)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          path: .caller-repo

      - name: Download results artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0  # v5.0.0
        with:
          name: bumblebee-results-${{ github.run_id }}
          path: results

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install secinfra
        run: pip install --quiet .secinfra/

      - name: Configure AWS credentials (OIDC → SES role)
        if: ${{ env.SECINFRA_SES_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708  # v5.1.1
        with:
          role-to-assume: ${{ secrets.SECINFRA_SES_ROLE_ARN }}
          aws-region: ${{ secrets.SECINFRA_SES_REGION || 'us-east-1' }}

      - name: Send email report
        env:
          GITHUB_WORKSPACE: .caller-repo
          SECINFRA_SES_FROM: ${{ secrets.SECINFRA_SES_FROM }}
          SECINFRA_SES_REGION: ${{ secrets.SECINFRA_SES_REGION || 'us-east-1' }}
          SECINFRA_SECURITY_CC: ${{ secrets.SECINFRA_SECURITY_CC }}
          SECINFRA_DRY_RUN: ${{ secrets.SECINFRA_SES_ROLE_ARN == '' && '1' || '0' }}
        run: |
          python -m secinfra.bumblebee_report \
            --results-dir results \
            --workspace .caller-repo
