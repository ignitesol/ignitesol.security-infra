# Self-test CI for the security-infra repo itself.
# Lints Python, runs unit tests (when added), and does a dry-run
# of each report script against fixture data.

name: Self-Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install --quiet ruff
      - run: ruff check scripts/

  dry-run:
    name: Dry-run all report scripts
    runs-on: ubuntu-latest
    env:
      SECINFRA_DRY_RUN: "1"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install --quiet .

      - name: Dry-run security_report (empty results)
        run: |
          mkdir -p /tmp/sec-results
          echo '[]' > /tmp/sec-results/gitleaks.json
          python -m secinfra.security_report \
            --results-dir /tmp/sec-results \
            --workspace .

      - name: Dry-run bumblebee_report (no file)
        run: |
          mkdir -p /tmp/bee-results
          python -m secinfra.bumblebee_report \
            --results-dir /tmp/bee-results \
            --workspace .

      - name: Dry-run license_report (empty)
        run: |
          mkdir -p /tmp/lic-results
          echo '{}' > /tmp/lic-results/licenses-current.json
          python -m secinfra.license_report \
            --results-dir /tmp/lic-results \
            --workspace .
