# Drop this file into your repo at .github/workflows/compliance.yml
# Adjust the 'on:' triggers and input values as needed.
# See examples/cron-suggestions.md for recommended schedule options.

name: Compliance

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Uncomment and adjust to add a scheduled run:
  # schedule:
  #   - cron: '0 6 * * *'    # nightly at 06:00 UTC

permissions:
  contents: write        # System 3 commits its dependency manifest
  id-token: write        # OIDC → SES in the notify jobs
  security-events: write # System 1 uploads SARIF to GitHub Code Scanning

jobs:
  security:
    uses: ignitesol/ignitesol.security-infra/.github/workflows/security-scan.yml@v1
    secrets: inherit
    # with:
    #   scan_root: src/          # default: .
    #   semgrep_rules: p/python  # override central rules

  licenses:
    uses: ignitesol/ignitesol.security-infra/.github/workflows/license-tracker.yml@v1
    secrets: inherit
    # with:
    #   ecosystems: npm,python   # default: npm,python,java

  bumblebee:
    uses: ignitesol/ignitesol.security-infra/.github/workflows/bumblebee-scan.yml@v1
    secrets: inherit
    # with:
    #   scan_profile: project      # default: project  (baseline|project|deep)
    #   scan_max_duration: 10m     # cap the scan walk; raise for large dep trees
